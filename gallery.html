<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmiLuna Gallery</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="commerce.css" />
    <link rel="stylesheet" href="gallery.css" />
</head>
<body>

<header class="site-header">
    <div class="logo">AMILUNA</div>
    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
    </nav>
</header>

<main class="gallery-page">
    <section class="gallery-copy">
        <p class="category-label">Photo Gallery</p>
        <h1>AmiLuna Gallery Showcase</h1>
        <p class="subtext">A calmer curated wall of artwork with one featured piece and a clean browse layout.</p>

        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="vertical">Vertical</button>
            <button class="filter-btn" data-filter="horizontal">Horizontal</button>
        </div>
    </section>

    <div class="mobile-hint">Tap an artwork to expand</div>

    <div class="hero-wrapper" id="hero-viewer">
        <div class="hero-main-view">
            <img id="hero-img" src="" alt="Hero View">
        </div>
        <aside class="hero-sidebar">
            <span class="close-btn" id="close-hero">&times;</span>
            <div class="hero-text">
                <h2 id="hero-title">Artwork Title</h2>
            </div>
            <div class="hero-thumbnails" id="hero-thumb-strip"></div>
        </aside>
    </div>

    <section class="gallery-curation" id="gallery-container">
        <section class="spotlight-stage" id="featured-card"></section>
        <section class="gallery-grid" id="gallery-grid" aria-label="Artwork gallery"></section>
    </section>
</main>

<script type="module" src="./gallery.js"></script>
<script type="module" src="./commerce-ui.js"></script>
</body>
</html>
